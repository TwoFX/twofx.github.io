name: Build and deploy blog

on:
  push:
    branches: [master]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install elan
        run: |
          set -euo pipefail
          curl -sSfL https://github.com/leanprover/elan/releases/latest/download/elan-x86_64-unknown-linux-gnu.tar.gz | tar xz
          ./elan-init -y --default-toolchain none
          echo "$HOME/.elan/bin" >> "$GITHUB_PATH"

      - name: Cache toolchains and builds
        uses: actions/cache@v4
        with:
          path: |
            ~/.elan
            .lake
            examples/*/.lake
          key: blog-${{ runner.os }}-${{ hashFiles('lean-toolchain', 'lake-manifest.json', 'examples/*/lean-toolchain', 'examples/*/lake-manifest.json') }}
          restore-keys: |
            blog-${{ runner.os }}-

      - name: Build site
        run: lake exe blog --output _site

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: _site

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
